<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; base-uri 'none'; form-action 'none'">
<title>YarnSwap — Find a substitute yarn</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>YarnSwap</h1>
  <p>Can't find the yarn your pattern calls for? Find a workable substitute.</p>
</header>
<main>
  <div class="panel">
    <div class="tabs">
      <button id="tabPick" class="active">Pick the pattern yarn</button>
      <button id="tabSpecs">Enter yarn specs</button>
    </div>

    <div id="modePick">
      <label for="yarnSelect">Yarn the pattern calls for</label>
      <select id="yarnSelect"></select>
    </div>

    <div id="modeSpecs" style="display:none">
      <div class="grid cols4">
        <div>
          <label for="sWeight">Yarn weight</label>
          <select id="sWeight"></select>
        </div>
        <div>
          <label for="sYds">Yards per ball</label>
          <input type="number" id="sYds" value="220" min="1">
        </div>
        <div>
          <label for="sGrams">Grams per ball</label>
          <input type="number" id="sGrams" value="100" min="1">
        </div>
        <div>
          <label for="sGauge">Gauge (sts / 4 in, optional)</label>
          <input type="number" id="sGauge" placeholder="e.g. 20" min="4" max="50">
        </div>
      </div>
      <div class="grid cols4" style="margin-top:14px">
        <div>
          <label for="sFiber">Main fiber</label>
          <select id="sFiber"></select>
        </div>
        <div>
          <label for="sFiberPct">Main fiber %</label>
          <input type="number" id="sFiberPct" value="100" min="1" max="100">
        </div>
        <div>
          <label for="sFiber2">Secondary fiber (if blend)</label>
          <select id="sFiber2"></select>
        </div>
        <div class="check" style="margin-top:22px">
          <input type="checkbox" id="sWash"> <label for="sWash" style="margin:0;color:var(--ink)">Machine washable</label>
        </div>
      </div>
    </div>

    <div class="grid cols3" style="margin-top:16px">
      <div>
        <label for="fWash">Care requirement</label>
        <select id="fWash">
          <option value="any">Any</option>
          <option value="machine">Machine washable only</option>
        </select>
      </div>
      <div>
        <label for="fPrice">Price range</label>
        <select id="fPrice">
          <option value="any">Any</option>
          <option value="1">Budget</option>
          <option value="2">Budget–mid</option>
          <option value="3">Any incl. premium</option>
        </select>
      </div>
      <div>
        <label for="fFam">Fiber preference</label>
        <select id="fFam">
          <option value="any">Any fiber</option>
          <option value="animal">Animal (wool, alpaca…)</option>
          <option value="plant">Plant (cotton, linen…)</option>
          <option value="synthetic">Synthetic (acrylic…)</option>
        </select>
      </div>
    </div>

    <button id="findBtn" class="findbtn">Find substitutes</button>
  </div>

  <div id="results" aria-live="polite"></div>

  <p class="note">Match scores weigh yarn weight, thickness (yards per gram), gauge, fiber content, and care.
  Always knit a gauge swatch before committing — no substitute is identical. Buy links open retailer searches.</p>
</main>

<script src="scoring.js"></script>
<script src="app.js"></script>
</body>
</html>
