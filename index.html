<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YarnSwap — Find a substitute yarn</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2d2a26;
    --muted: #6a6359;
    --accent: #b5485d;
    --accent-soft: #f6e3e7;
    --good: #2e7d52;
    --ok: #8a6120;
    --border: #e7e0d6;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 28px 20px 22px;
    text-align: center;
  }
  header h1 { margin: 0; font-size: 1.9rem; font-weight: normal; letter-spacing: .5px; }
  header p { margin: 6px 0 0; opacity: .9; font-style: italic; }
  main { max-width: 980px; margin: 0 auto; padding: 24px 16px 60px; }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tabs button {
    flex: 1; padding: 10px; font-family: inherit; font-size: 1rem;
    border: 1px solid var(--border); background: var(--bg);
    border-radius: 8px; cursor: pointer; color: var(--muted);
  }
  .tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: bold; }

  label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 4px; }
  select, input[type=number], input[type=text] {
    width: 100%; padding: 9px 10px; font-family: inherit; font-size: 1rem;
    border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--ink);
  }
  .grid { display: grid; gap: 14px; }
  .grid.cols3 { grid-template-columns: repeat(3, 1fr); }
  .grid.cols4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 700px) { .grid.cols3, .grid.cols4 { grid-template-columns: 1fr 1fr; } }

  .check { display: flex; align-items: center; gap: 8px; font-size: .95rem; color: var(--ink); margin-top: 22px; }
  .check input { width: auto; }

  .findbtn {
    margin-top: 18px; width: 100%; padding: 13px; font-family: inherit; font-size: 1.1rem;
    background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer;
  }
  .findbtn:hover { filter: brightness(1.08); }

  .results-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; }
  .results-head h2 { font-weight: normal; font-size: 1.3rem; margin: 0 0 12px; }
  .results-head .basis { font-size: .85rem; color: var(--muted); font-style: italic; }
  .results-meta { font-size: .8rem; color: var(--muted); margin: -4px 0 14px; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 14px;
    display: grid; grid-template-columns: 70px 1fr auto; gap: 16px; align-items: start;
  }
  @media (max-width: 700px) { .card { grid-template-columns: 60px 1fr; } .buylinks { grid-column: 1 / -1; } }
  .score {
    width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem; font-weight: bold; color: #fff;
  }
  .score.great { background: var(--good); }
  .score.good { background: var(--ok); }
  .card h3 { margin: 0 0 2px; font-size: 1.15rem; font-weight: bold; }
  .card .brand { color: var(--muted); font-size: .9rem; }
  .specs { margin: 8px 0 0; font-size: .88rem; color: var(--ink); }
  .specs span { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; margin: 2px 4px 2px 0; }
  .why { margin-top: 8px; font-size: .85rem; color: var(--muted); font-style: italic; }
  .buylinks { display: flex; flex-direction: column; gap: 6px; min-width: 130px; }
  .buylinks a {
    font-size: .85rem; text-decoration: none; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 6px; padding: 5px 10px; text-align: center;
  }
  .buylinks a:hover { background: var(--accent-soft); }
  .empty { text-align: center; color: var(--muted); font-style: italic; padding: 30px 0; }
  .errs { border-color: var(--accent); }
  .errs h2 { font-size: 1.05rem; font-weight: bold; margin: 0 0 8px; color: var(--accent); }
  .errs ul { margin: 0; padding-left: 20px; font-size: .9rem; }
  .errs li { margin: 2px 0; }
  input.invalid { border-color: var(--accent); background: var(--accent-soft); }
  .note { font-size: .8rem; color: var(--muted); margin-top: 30px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>YarnSwap</h1>
  <p>Can't find the yarn your pattern calls for? Find a workable substitute.</p>
</header>
<main>
  <div class="panel">
    <div class="tabs">
      <button id="tabPick" class="active">Pick the pattern yarn</button>
      <button id="tabSpecs">Enter yarn specs</button>
    </div>

    <div id="modePick">
      <label for="yarnSelect">Yarn the pattern calls for</label>
      <select id="yarnSelect"></select>
    </div>

    <div id="modeSpecs" style="display:none">
      <div class="grid cols4">
        <div>
          <label for="sWeight">Yarn weight</label>
          <select id="sWeight"></select>
        </div>
        <div>
          <label for="sYds">Yards per ball</label>
          <input type="number" id="sYds" value="220" min="1">
        </div>
        <div>
          <label for="sGrams">Grams per ball</label>
          <input type="number" id="sGrams" value="100" min="1">
        </div>
        <div>
          <label for="sGauge">Gauge (sts / 4 in, optional)</label>
          <input type="number" id="sGauge" placeholder="e.g. 20" min="4" max="50">
        </div>
      </div>
      <div class="grid cols4" style="margin-top:14px">
        <div>
          <label for="sFiber">Main fiber</label>
          <select id="sFiber"></select>
        </div>
        <div>
          <label for="sFiberPct">Main fiber %</label>
          <input type="number" id="sFiberPct" value="100" min="1" max="100">
        </div>
        <div>
          <label for="sFiber2">Secondary fiber (if blend)</label>
          <select id="sFiber2"></select>
        </div>
        <div class="check" style="margin-top:22px">
          <input type="checkbox" id="sWash"> <label for="sWash" style="margin:0;color:var(--ink)">Machine washable</label>
        </div>
      </div>
    </div>

    <div class="grid cols3" style="margin-top:16px">
      <div>
        <label for="fWash">Care requirement</label>
        <select id="fWash">
          <option value="any">Any</option>
          <option value="machine">Machine washable only</option>
        </select>
      </div>
      <div>
        <label for="fPrice">Price range</label>
        <select id="fPrice">
          <option value="any">Any</option>
          <option value="1">Budget</option>
          <option value="2">Budget–mid</option>
          <option value="3">Any incl. premium</option>
        </select>
      </div>
      <div>
        <label for="fFam">Fiber preference</label>
        <select id="fFam">
          <option value="any">Any fiber</option>
          <option value="animal">Animal (wool, alpaca…)</option>
          <option value="plant">Plant (cotton, linen…)</option>
          <option value="synthetic">Synthetic (acrylic…)</option>
        </select>
      </div>
    </div>

    <button id="findBtn" class="findbtn">Find substitutes</button>
  </div>

  <div id="results" aria-live="polite"></div>

  <p class="note">Match scores weigh yarn weight, thickness (yards per gram), gauge, fiber content, and care.
  Always knit a gauge swatch before committing — no substitute is identical. Buy links open retailer searches.</p>
</main>

<script>
// ---------- Yarn database (starter set — specs approximate, per ball) ----------
// w: weight, f: fiber %s, yds/g: per ball, ga: typical sts per 4in, mw: machine washable, p: price tier 1-3
const WEIGHTS = ["Lace","Fingering","Sport","DK","Worsted","Aran","Bulky","Super Bulky"];
const FIBERS = ["wool","merino","alpaca","mohair","silk","cashmere","cotton","linen","bamboo","acrylic","nylon","polyester"];
const FAMILY = { wool:"animal", merino:"animal", alpaca:"animal", mohair:"animal", silk:"animal", cashmere:"animal",
                 cotton:"plant", linen:"plant", bamboo:"plant",
                 acrylic:"synthetic", nylon:"synthetic", polyester:"synthetic" };

const YARNS = [
 {b:"Cascade", n:"220", w:"Worsted", f:{wool:100}, yds:220, g:100, ga:20, mw:false, p:2},
 {b:"Cascade", n:"220 Superwash", w:"Worsted", f:{wool:100}, yds:220, g:100, ga:20, mw:true, p:2},
 {b:"Patons", n:"Classic Wool Worsted", w:"Worsted", f:{wool:100}, yds:194, g:100, ga:20, mw:false, p:1},
 {b:"Knit Picks", n:"Wool of the Andes", w:"Worsted", f:{wool:100}, yds:110, g:50, ga:19, mw:false, p:1},
 {b:"Malabrigo", n:"Rios", w:"Worsted", f:{merino:100}, yds:210, g:100, ga:18, mw:true, p:3},
 {b:"Lion Brand", n:"Wool-Ease", w:"Worsted", f:{acrylic:80, wool:20}, yds:197, g:85, ga:18, mw:true, p:1},
 {b:"Plymouth", n:"Encore Worsted", w:"Worsted", f:{acrylic:75, wool:25}, yds:200, g:100, ga:18, mw:true, p:2},
 {b:"Berroco", n:"Vintage", w:"Worsted", f:{acrylic:52, wool:40, nylon:8}, yds:218, g:100, ga:19, mw:true, p:2},
 {b:"Red Heart", n:"Super Saver", w:"Worsted", f:{acrylic:100}, yds:364, g:198, ga:17, mw:true, p:1},
 {b:"Caron", n:"Simply Soft", w:"Worsted", f:{acrylic:100}, yds:315, g:170, ga:18, mw:true, p:1},
 {b:"Knit Picks", n:"Brava Worsted", w:"Worsted", f:{acrylic:100}, yds:218, g:100, ga:18, mw:true, p:1},
 {b:"Berroco", n:"Ultra Alpaca", w:"Worsted", f:{alpaca:50, wool:50}, yds:215, g:100, ga:20, mw:false, p:2},
 {b:"Lily", n:"Sugar'n Cream", w:"Worsted", f:{cotton:100}, yds:120, g:71, ga:18, mw:true, p:1},
 {b:"Cascade", n:"Ultra Pima", w:"DK", f:{cotton:100}, yds:220, g:100, ga:22, mw:true, p:2},
 {b:"Stylecraft", n:"Special DK", w:"DK", f:{acrylic:100}, yds:322, g:100, ga:22, mw:true, p:1},
 {b:"Paintbox", n:"Simply DK", w:"DK", f:{acrylic:100}, yds:302, g:100, ga:22, mw:true, p:1},
 {b:"Drops", n:"Karisma", w:"DK", f:{wool:100}, yds:109, g:50, ga:21, mw:true, p:1},
 {b:"Drops", n:"Merino Extra Fine", w:"DK", f:{merino:100}, yds:114, g:50, ga:21, mw:true, p:1},
 {b:"Sirdar", n:"Snuggly DK", w:"DK", f:{acrylic:55, nylon:45}, yds:179, g:50, ga:22, mw:true, p:1},
 {b:"Rowan", n:"Felted Tweed", w:"DK", f:{wool:50, alpaca:25, polyester:25}, yds:191, g:50, ga:23, mw:false, p:3},
 {b:"Knit Picks", n:"Swish DK", w:"DK", f:{merino:100}, yds:123, g:50, ga:22, mw:true, p:2},
 {b:"Scheepjes", n:"Catona", w:"Sport", f:{cotton:100}, yds:136, g:50, ga:24, mw:true, p:1},
 {b:"Drops", n:"Alpaca", w:"Sport", f:{alpaca:100}, yds:182, g:50, ga:24, mw:false, p:1},
 {b:"Cascade", n:"220 Sport", w:"Sport", f:{wool:100}, yds:164, g:50, ga:24, mw:false, p:2},
 {b:"Knit Picks", n:"Brava Sport", w:"Sport", f:{acrylic:100}, yds:340, g:100, ga:24, mw:true, p:1},
 {b:"Debbie Bliss", n:"Baby Cashmerino", w:"Sport", f:{merino:55, acrylic:33, cashmere:12}, yds:137, g:50, ga:25, mw:true, p:2},
 {b:"Knit Picks", n:"Palette", w:"Fingering", f:{wool:100}, yds:231, g:50, ga:28, mw:false, p:1},
 {b:"Drops", n:"Fabel", w:"Fingering", f:{wool:75, nylon:25}, yds:224, g:50, ga:26, mw:true, p:1},
 {b:"Malabrigo", n:"Sock", w:"Fingering", f:{merino:100}, yds:440, g:100, ga:28, mw:true, p:3},
 {b:"Lion Brand", n:"Sock-Ease", w:"Fingering", f:{wool:75, nylon:25}, yds:438, g:100, ga:28, mw:true, p:1},
 {b:"Cascade", n:"Heritage", w:"Fingering", f:{merino:75, nylon:25}, yds:437, g:100, ga:28, mw:true, p:2},
 {b:"Rowan", n:"Kidsilk Haze", w:"Lace", f:{mohair:70, silk:30}, yds:229, g:25, ga:25, mw:false, p:3},
 {b:"Drops", n:"Kid-Silk", w:"Lace", f:{mohair:75, silk:25}, yds:230, g:25, ga:24, mw:false, p:2},
 {b:"Malabrigo", n:"Lace", w:"Lace", f:{merino:100}, yds:470, g:50, ga:32, mw:false, p:3},
 {b:"Knit Picks", n:"Shadow", w:"Lace", f:{merino:100}, yds:440, g:50, ga:30, mw:false, p:1},
 {b:"Lion Brand", n:"Wool-Ease Thick & Quick", w:"Super Bulky", f:{acrylic:80, wool:20}, yds:106, g:170, ga:9, mw:true, p:1},
 {b:"Cascade", n:"Magnum", w:"Super Bulky", f:{wool:100}, yds:123, g:250, ga:8, mw:false, p:2},
 {b:"Malabrigo", n:"Rasta", w:"Super Bulky", f:{merino:100}, yds:90, g:150, ga:8, mw:false, p:3},
 {b:"Bernat", n:"Blanket", w:"Super Bulky", f:{polyester:100}, yds:220, g:300, ga:8, mw:true, p:1},
 {b:"Bernat", n:"Softee Chunky", w:"Bulky", f:{acrylic:100}, yds:108, g:100, ga:13, mw:true, p:1},
 {b:"Drops", n:"Andes", w:"Bulky", f:{wool:65, alpaca:35}, yds:104, g:100, ga:13, mw:false, p:1},
 {b:"Lion Brand", n:"Hue + Me", w:"Bulky", f:{acrylic:80, wool:20}, yds:137, g:125, ga:12, mw:true, p:1},
 {b:"Drops", n:"Paris", w:"Aran", f:{cotton:100}, yds:82, g:50, ga:17, mw:true, p:1},
 {b:"Drops", n:"Nepal", w:"Aran", f:{wool:65, alpaca:35}, yds:82, g:50, ga:17, mw:false, p:1},
 {b:"Lion Brand", n:"Heartland", w:"Aran", f:{acrylic:100}, yds:251, g:142, ga:16, mw:true, p:1},
];

// ---------- helpers ----------
// escape any string before it goes into innerHTML. all current data is static,
// but routing interpolation through this keeps the app safe once free-text
// fields (e.g. a custom yarn name) are added.
const escapeHtml = s => String(s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const ypg = y => y.yds / y.g;
const famPct = f => {
  const out = {animal:0, plant:0, synthetic:0};
  for (const [fib, pct] of Object.entries(f)) out[FAMILY[fib]] += pct;
  return out;
};
const fiberLabel = f => Object.entries(f).sort((a,b)=>b[1]-a[1])
  .map(([fib,pct]) => `${pct}% ${fib}`).join(", ");

// ---------- scoring ----------
// term weights: full-match points per term (weight + thickness + fiber + gauge + care = 100)
const PTS = {
  weight: 35,         // same weight class
  weightAdjacent: 17, // one class away
  thickness: 25,      // yards-per-gram closeness
  fiber: 20,          // fiber content overlap
  gauge: 15,          // stitch-gauge closeness
  gaugeUnknown: 8,    // neutral credit when the target's gauge isn't known
  care: 5,            // not losing machine-washability
};
const THICKNESS_SLOPE = 3;     // thickness term reaches 0 at a 33% relative difference
const GAUGE_SLOPE = 3;         // points lost per stitch (per 4 in) of gauge difference
const FIBER_EXACT_SHARE = 0.6; // exact-fiber vs fiber-family mix in the fiber term
const MIN_SCORE = 55;          // candidates scoring below this are hidden
const MAX_RESULTS = 10;        // show at most this many matches

// relative thickness difference, symmetric: measured against the mean of the
// two values so A-vs-B always equals B-vs-A
function thicknessDiff(target, cand) {
  const a = ypg(target), b = ypg(cand);
  return Math.abs(a - b) / ((a + b) / 2);
}

// 0-100 fiber similarity: blend of exact-fiber overlap and family overlap.
// used by both score() and whyText() so the rationale matches the number.
function fiberSimilarity(target, cand) {
  let exact = 0;
  for (const fib of FIBERS) exact += Math.min(target.f[fib]||0, cand.f[fib]||0);
  // treat wool & merino as near-equivalent for the exact-overlap part
  const tw = (target.f.wool||0)+(target.f.merino||0), cw = (cand.f.wool||0)+(cand.f.merino||0);
  exact = Math.max(exact, exact + Math.min(tw,cw) - Math.min(target.f.wool||0,cand.f.wool||0) - Math.min(target.f.merino||0,cand.f.merino||0));
  const tf = famPct(target.f), cf = famPct(cand.f);
  let fam = 0;
  for (const k of ["animal","plant","synthetic"]) fam += Math.min(tf[k], cf[k]);
  return FIBER_EXACT_SHARE * exact + (1 - FIBER_EXACT_SHARE) * fam;
}

function score(target, cand) {
  const wDiff = Math.abs(WEIGHTS.indexOf(target.w) - WEIGHTS.indexOf(cand.w));
  if (wDiff > 1) return null;                       // too far apart in weight
  let pts = wDiff === 0 ? PTS.weight : PTS.weightAdjacent;

  // thickness: yards per gram
  pts += Math.max(0, PTS.thickness * (1 - thicknessDiff(target, cand) * THICKNESS_SLOPE));

  // gauge
  if (target.ga && cand.ga) pts += Math.max(0, PTS.gauge - GAUGE_SLOPE * Math.abs(target.ga - cand.ga));
  else pts += PTS.gaugeUnknown;

  // fiber
  pts += fiberSimilarity(target, cand) * PTS.fiber / 100;

  // care: only penalize losing machine-washability
  pts += (target.mw && !cand.mw) ? 0 : PTS.care;

  return Math.round(pts);
}

function whyText(target, cand) {
  const bits = [];
  bits.push(target.w === cand.w ? "same weight class" : "adjacent weight class — swatch carefully");
  const d = Math.round(100 * thicknessDiff(target, cand));  // same measure score() uses
  bits.push(d <= 5 ? "nearly identical thickness" : `${d}% thickness difference`);
  const fiber = fiberSimilarity(target, cand);              // same measure score() uses
  bits.push(fiber >= 75 ? "similar fiber character" : "different fiber character — drape will change");
  if (target.mw && !cand.mw) bits.push("NOT machine washable");
  return bits.join(" · ");
}

// ---------- buy links ----------
// per-retailer query tuning: Amazon gets an extra "yarn" keyword to disambiguate
// against its general catalog; LoveCrafts/Hobbii search yarn-only catalogs already.
function buyLinks(y) {
  const q = encodeURIComponent(`${y.b} ${y.n}`);
  return `
    <a target="_blank" rel="noopener" href="https://www.lovecrafts.com/en-us/search?term=${q}">LoveCrafts</a>
    <a target="_blank" rel="noopener" href="https://hobbii.com/catalogsearch/result/?q=${q}">Hobbii</a>
    <a target="_blank" rel="noopener" href="https://www.amazon.com/s?k=${q}+yarn">Amazon</a>`;
}

// ---------- UI ----------
let tab = "pick";
function setTab(t) {
  tab = t;
  document.getElementById("tabPick").classList.toggle("active", t === "pick");
  document.getElementById("tabSpecs").classList.toggle("active", t === "specs");
  document.getElementById("modePick").style.display = t === "pick" ? "" : "none";
  document.getElementById("modeSpecs").style.display = t === "specs" ? "" : "none";
}

// validate the specs form; returns an array of human-readable error messages.
// also toggles the .invalid outline on offending fields. empty array === valid.
function validateSpecs() {
  const errs = [];
  const ids = ["sYds", "sGrams", "sGauge", "sFiberPct"];
  ids.forEach(id => document.getElementById(id).classList.remove("invalid"));
  const mark = (id, msg) => { document.getElementById(id).classList.add("invalid"); errs.push(msg); };
  const raw = id => document.getElementById(id).value.trim();
  const num = id => raw(id) === "" ? NaN : Number(raw(id));

  const yds = num("sYds");
  if (!Number.isFinite(yds) || yds <= 0) mark("sYds", "Yards per ball must be a number greater than 0.");
  else if (yds > 3000) mark("sYds", "Yards per ball looks too high (max 3000).");

  const grams = num("sGrams");
  if (!Number.isFinite(grams) || grams <= 0) mark("sGrams", "Grams per ball must be a number greater than 0.");
  else if (grams > 1000) mark("sGrams", "Grams per ball looks too high (max 1000).");

  const gaugeRaw = raw("sGauge");
  if (gaugeRaw !== "") {                       // gauge is optional
    const ga = Number(gaugeRaw);
    if (!Number.isFinite(ga) || ga < 4 || ga > 50) mark("sGauge", "Gauge must be between 4 and 50 sts / 4 in (or left blank).");
  }

  const pct = num("sFiberPct");
  if (!Number.isFinite(pct) || pct < 1 || pct > 100) mark("sFiberPct", "Main fiber % must be between 1 and 100.");

  return errs;
}

function getTarget() {
  if (tab === "pick") return YARNS[+document.getElementById("yarnSelect").value];
  const fib = document.getElementById("sFiber").value;
  const pct = Math.min(100, Math.max(1, +document.getElementById("sFiberPct").value || 100));
  const fib2 = document.getElementById("sFiber2").value;   // "" = unknown / not specified
  const f = {[fib]: pct};
  // assign the <100% remainder to an explicit secondary fiber. if left unknown,
  // leave it unaccounted — it simply won't contribute to fiber overlap, rather
  // than guessing a fiber that could skew the match.
  if (pct < 100 && fib2 && fib2 !== fib) f[fib2] = 100 - pct;
  return {
    b:"(custom)", n:"pattern yarn",
    w: document.getElementById("sWeight").value,
    f, yds:+document.getElementById("sYds").value || 220,
    g:+document.getElementById("sGrams").value || 100,
    ga:+document.getElementById("sGauge").value || null,
    mw: document.getElementById("sWash").checked,
  };
}

function findSubs() {
  if (tab === "specs") {
    const errs = validateSpecs();
    if (errs.length) {
      document.getElementById("results").innerHTML =
        `<div class="panel errs"><h2>Please fix the following:</h2><ul>${
          errs.map(e => `<li>${escapeHtml(e)}</li>`).join("")}</ul></div>`;
      return;
    }
  }

  const target = getTarget();
  const wash = document.getElementById("fWash").value;
  const price = document.getElementById("fPrice").value;
  const fam = document.getElementById("fFam").value;

  const scored = YARNS
    .filter(y => !(tab === "pick" && y === target))
    .filter(y => wash !== "machine" || y.mw)
    .filter(y => price === "any" || y.p <= +price)
    .filter(y => fam === "any" || famPct(y.f)[fam] >= 50)
    .map(y => ({y, s: score(target, y)}))
    .filter(r => r.s !== null)
    .sort((a,b) => b.s - a.s);
  const passing = scored.filter(r => r.s >= MIN_SCORE);
  const rows = passing.slice(0, MAX_RESULTS);
  const belowBar = scored.length - passing.length;

  const el = document.getElementById("results");
  const basis = escapeHtml(`${target.b} ${target.n} — ${target.w}, ${fiberLabel(target.f)}, ${target.yds} yds / ${target.g} g`);
  if (!rows.length) {
    el.innerHTML = `<div class="panel empty">${belowBar
      ? `${belowBar} candidate${belowBar>1?"s":""} matched the filters but scored below the ${MIN_SCORE}-point quality bar. Try loosening the filters.`
      : `No candidates match these filters. Try loosening the filters.`}</div>`;
    return;
  }
  const metaBits = [];
  if (passing.length > rows.length) metaBits.push(`showing the top ${rows.length} of ${passing.length} matches`);
  if (belowBar > 0) metaBits.push(`${belowBar} candidate${belowBar>1?"s":""} below the ${MIN_SCORE}-point quality bar hidden`);
  el.innerHTML = `
    <div class="results-head">
      <h2>${rows.length} substitute${rows.length>1?"s":""} found</h2>
      <span class="basis">for ${basis}</span>
    </div>` +
    (metaBits.length ? `<div class="results-meta">${metaBits.join(" · ")}</div>` : "") +
    rows.map(({y, s}) => `
      <div class="card">
        <div class="score ${s >= 80 ? "great" : "good"}">${Math.min(s,99)}%</div>
        <div>
          <h3>${escapeHtml(`${y.b} ${y.n}`)}</h3>
          <div class="brand">${s >= 80 ? "Excellent match" : "Good match"}</div>
          <div class="specs">
            <span>${escapeHtml(y.w)}</span><span>${escapeHtml(fiberLabel(y.f))}</span>
            <span>${y.yds} yds / ${y.g} g</span><span>${y.ga} sts / 4 in</span>
            <span>${y.mw ? "machine wash" : "hand wash"}</span>
            <span>${"$".repeat(y.p)}</span>
          </div>
          <div class="why">${escapeHtml(whyText(target, y))}</div>
        </div>
        <div class="buylinks">${buyLinks(y)}</div>
      </div>`).join("");
}

// ---------- init ----------
(function init() {
  const sel = document.getElementById("yarnSelect");
  YARNS.map((y, i) => ({i, label:`${y.b} ${y.n} (${y.w})`}))
       .sort((a,b) => a.label.localeCompare(b.label))
       .forEach(({i, label}) => sel.add(new Option(label, i)));
  const sw = document.getElementById("sWeight");
  WEIGHTS.forEach(w => sw.add(new Option(w, w)));
  sw.value = "Worsted";
  const sf = document.getElementById("sFiber");
  FIBERS.forEach(f => sf.add(new Option(f, f)));
  sf.value = "wool";
  const sf2 = document.getElementById("sFiber2");
  sf2.add(new Option("(unknown)", ""));
  FIBERS.forEach(f => sf2.add(new Option(f, f)));
  sf2.value = "";

  // wire up controls (no inline handlers — keeps a strict CSP possible)
  document.getElementById("tabPick").addEventListener("click", () => setTab("pick"));
  document.getElementById("tabSpecs").addEventListener("click", () => setTab("specs"));
  document.getElementById("findBtn").addEventListener("click", findSubs);
})();
</script>
</body>
</html>
